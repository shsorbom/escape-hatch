services:
  synapse:
    image: matrixdotorg/synapse:1.110.0
    container_name: synapse
    restart: unless-stopped
    environment:
      - SYNAPSE_REPORT_STATS=no
      - TZ=${TZ}
      - SYNAPSE_REGISTRATION_SHARED_SECRET=${SYNAPSE_REGISTRATION_SHARED_SECRET}
      - SYNAPSE_MACAROON_SECRET_KEY=${SYNAPSE_MACAROON_SECRET_KEY}
      - SYNAPSE_FORM_SECRET=${SYNAPSE_FORM_SECRET}
    volumes:
      - ./synapse/data:/data
      - ./synapse/modules:/modules
    networks:
      - backend
    depends_on:
      synapse-db:
        condition: service_healthy

  synapse-db:
    image: postgres:15.6-alpine
    container_name: synapse-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=synapse
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - ./synapse/db:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 10s
      timeout: 5s
      retries: 5
