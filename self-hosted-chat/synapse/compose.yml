services:
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: synapse
    restart: unless-stopped
    environment:
      - SYNAPSE_SERVER_NAME=${MATRIX_SERVER_NAME}
      - SYNAPSE_REPORT_STATS=no
      - TZ=${TZ}
       # 🔐 Inject secrets into container
      - SYNAPSE_REGISTRATION_SHARED_SECRET=${SYNAPSE_REGISTRATION_SHARED_SECRET}
      - SYNAPSE_MACAROON_SECRET_KEY=${SYNAPSE_MACAROON_SECRET_KEY}
      - SYNAPSE_FORM_SECRET=${SYNAPSE_FORM_SECRET}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./synapse/data:/data
      - ./synapse/modules:/modules

    networks:
      - backend
    depends_on:
      - synapse-db

  synapse-db:
    image: postgres:15-alpine
    container_name: synapse-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=synapse
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=synapse
    volumes:
      - ./synapse/db:/var/lib/postgresql/data
    networks:
      - backend
