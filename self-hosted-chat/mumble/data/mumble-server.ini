# Database
database=/data/mumble.sqlite
dbDriver=SQLite

# Logging
logfile=/data/mumble.log
logdays=7

# Network
host=0.0.0.0
port=64738
users=50
bandwidth=96000

# Security
#serverpassword=YOUR_SERVER_PASSWORD_HERE # Already set in the compose file. This is a placeholder
autobanAttempts=3
autobanTimeframe=120
autobanTime=600

# Disable LAN discovery
bonjour=false

# Disable HTML in comments
allowhtml=false

# Do NOT register publicly
registerName=
registerPassword=
registerUrl=
registerHostname=

# Audio tuning
opusthreshold=0
