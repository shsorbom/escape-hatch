# ==================================================
# HTTP → HTTPS Redirect (ALL subdomains)
# ==================================================
server {
    listen 80;
    server_name
        example.com
        matrix.example.com
        element.example.com
        call.example.com;

    return 301 https://$host$request_uri;
}

# ==================================================
# SHARED SSL SETTINGS
# ==================================================
ssl_protocols TLSv1.2 TLSv1.3;
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:10m;
ssl_session_tickets off;

ssl_prefer_server_ciphers off;

add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# ==================================================
# MAIN WEBSITE
# https://example.com
# ==================================================
server {
    listen 443 ssl http2;
    server_name example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://website:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Matrix client discovery
    location /.well-known/matrix/client {
        default_type application/json;
        return 200 '{
            "m.homeserver": {
                "base_url": "https://matrix.example.com"
            }
        }';
    }

    # Matrix server discovery
    location /.well-known/matrix/server {
        default_type application/json;
        return 200 '{
            "m.server": "matrix.example.com:443"
        }';
    }
}

# ==================================================
# MATRIX (Synapse)
# https://matrix.example.com
# ==================================================
server {
    listen 443 ssl http2;
    server_name matrix.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    client_max_body_size 50M;

    # Login brute-force protection
    location ~ ^/_matrix/client/.*/login$ {
        limit_req zone=login burst=5 nodelay;

        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # All other Matrix endpoints
    location ~ ^/(?:_matrix|_synapse/client) {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ==================================================
# ELEMENT WEB
# https://element.example.com
# ==================================================
server {
    listen 443 ssl http2;
    server_name element.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://element-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# ==================================================
# ELEMENT CALL (WebRTC + WebSockets)
# https://call.example.com
# ==================================================
server {
    listen 443 ssl http2;
    server_name call.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    location / {
        proxy_pass http://element-call:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Required for WebRTC / WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }
}
